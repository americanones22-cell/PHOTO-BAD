<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مركز التلغيم | HACKER VIP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', 'Fira Code', 'Cairo', 'Segoe UI', monospace;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #021a0b, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية الهولوجرام 010101 المتحركة */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
            font-family: monospace;
            font-size: 18px;
            color: #0f0;
            white-space: pre;
            overflow: hidden;
            line-height: 1.2;
        }

        .matrix-line {
            animation: slideMatrix 20s linear infinite;
            position: absolute;
            width: 100%;
        }

        @keyframes slideMatrix {
            0% { transform: translateY(-100%); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100%); opacity: 0; }
        }

        /* البطاقة الرئيسية - زجاجية خضراء */
        .glass-hacker {
            position: relative;
            z-index: 10;
            max-width: 580px;
            width: 100%;
            background: rgba(0, 20, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid #00ff4133;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3), 0 8px 32px rgba(0,0,0,0.4);
            transition: 0.3s;
            overflow: hidden;
        }

        .glass-hacker:hover {
            box-shadow: 0 0 35px #00ff41aa, 0 8px 40px black;
            border-color: #0f0;
        }

        /* رأس الموقع: مرڪز التلغـيم + Tremux */
        .hacker-header {
            background: #021a0cee;
            padding: 20px 20px 15px;
            text-align: center;
            border-bottom: 2px solid #0f0;
            position: relative;
        }

        .title-tremux {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .main-glitch {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #b3ffb0, #00ff80, #2eff8e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px #0f0;
            position: relative;
            animation: glitchText 1.5s infinite;
        }

        /* تأثير تريمكس (Termux) */
        .tremux-badge {
            background: #0a0f0a;
            border-radius: 60px;
            padding: 6px 18px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #0f0;
            box-shadow: 0 0 12px #0f0;
            animation: pulseBorder 1.8s infinite;
        }

        .tremux-badge span:first-child {
            font-size: 1.7rem;
            filter: drop-shadow(0 0 4px #0f0);
        }

        .tremux-badge span:last-child {
            font-family: monospace;
            font-weight: bold;
            font-size: 1.3rem;
            color: #0f0;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #0f0;
        }

        @keyframes pulseBorder {
            0% { box-shadow: 0 0 0 0 #0f0; border-color: #2aff6e; }
            50% { box-shadow: 0 0 18px 2px #0f0; border-color: #b3ffb0; }
            100% { box-shadow: 0 0 0 0 #0f0; border-color: #0f0; }
        }

        @keyframes glitchText {
            0% { text-shadow: -2px 0 #ff00c1, 2px 0 #00ff9d; opacity: 0.9; }
            2% { text-shadow: 2px 0 #ff00c1, -2px 0 #00ff9d; }
            4% { text-shadow: -2px 0 #ff00c1, 2px 0 #00ff9d; }
            100% { text-shadow: 0 0 8px #0f0; }
        }

        .sub-glitch {
            color: #7eff8e;
            font-size: 0.75rem;
            font-family: monospace;
            margin-top: 12px;
            letter-spacing: 1px;
            word-break: keep-all;
            background: #00000066;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }

        /* المحتوى */
        .content {
            padding: 28px 24px 26px;
        }

        /* رفع الملف - هكر */
        .file-box {
            background: #021a0d;
            border-radius: 36px;
            padding: 18px;
            text-align: center;
            border: 1px solid #00ff4180;
            margin-bottom: 28px;
            transition: 0.2s;
            cursor: pointer;
            box-shadow: inset 0 0 10px #00ff4110, 0 5px 10px #00000040;
        }

        .file-box:hover {
            background: #042010;
            border-color: #0f0;
            box-shadow: 0 0 15px #00ff4166;
        }

        .file-label {
            display: flex;
            flex-direction: column;
            gap: 8px;
            cursor: pointer;
        }

        .file-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 5px #0f0);
        }

        .file-text {
            color: #b0ffb0;
            font-weight: bold;
            font-size: 1rem;
            font-family: monospace;
        }

        .file-name {
            background: #000000aa;
            padding: 6px 12px;
            border-radius: 40px;
            color: #0f0;
            font-size: 0.8rem;
            font-family: monospace;
            border: 1px dashed #2eff6e;
            word-break: break-all;
        }

        input[type="file"] {
            display: none;
        }

        /* حقل أيدي تليجرام */
        .telegram-input {
            margin-bottom: 28px;
        }

        .telegram-input label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #0f0;
            margin-bottom: 10px;
            font-weight: bold;
            text-shadow: 0 0 3px #0f0;
            font-family: monospace;
        }

        .telegram-input input {
            width: 100%;
            background: #031007;
            border: 1px solid #00ff41;
            padding: 14px 18px;
            border-radius: 60px;
            color: #b6ffb0;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        .telegram-input input:focus {
            border-color: #ffd966;
            box-shadow: 0 0 12px #0f0;
            color: #fff;
        }

        /* أزرار هكر */
        .action-btn, .channel-btn {
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.15rem;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 18px;
            font-family: monospace;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #000000aa;
            backdrop-filter: blur(4px);
        }

        .action-btn {
            background: linear-gradient(95deg, #003d1a, #006633);
            border: 1px solid #2eff8e;
            color: #ccffcc;
            text-shadow: 0 0 5px #00ff80;
            box-shadow: 0 0 12px #00cc55;
        }

        .action-btn:hover {
            background: #009944;
            transform: translateY(-2px);
            box-shadow: 0 0 24px #00ff66;
            color: white;
        }

        .channel-btn {
            background: #031007;
            border: 1px solid #0f0;
            color: #0f0;
        }

        .channel-btn:hover {
            background: #0a2f1a;
            box-shadow: 0 0 14px #0f0;
            color: #ffffff;
            transform: scale(0.99);
        }

        /* تذييل هكر متحرك */
        .footer {
            text-align: center;
            padding-top: 18px;
            border-top: 1px solid #00ff4133;
            margin-top: 8px;
            font-size: 0.7rem;
        }

        .footer p {
            font-family: monospace;
            color: #5eff8e;
            background: #00000077;
            display: inline-block;
            padding: 6px 14px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            letter-spacing: 0.5px;
        }

        /* تأثير كتابة 0101 في الزوايا */
        .corner-binary {
            position: fixed;
            bottom: 15px;
            right: 15px;
            color: #1eff6e;
            font-size: 12px;
            font-family: monospace;
            z-index: 20;
            background: #00000077;
            padding: 4px 12px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            opacity: 0.6;
            animation: fadeBinary 3s infinite;
        }

        @keyframes fadeBinary {
            0% { opacity: 0.3; text-shadow: 0 0 0px #0f0; }
            100% { opacity: 1; text-shadow: 0 0 6px #0f0; }
        }

        .toast-hacker {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #021a0d;
            border: 1px solid #0f0;
            padding: 12px 24px;
            border-radius: 40px;
            color: #b3ffb0;
            font-family: monospace;
            font-weight: bold;
            opacity: 0;
            transition: 0.2s;
            z-index: 200;
            white-space: nowrap;
            backdrop-filter: blur(16px);
            font-size: 0.85rem;
            box-shadow: 0 0 15px #0f0;
            pointer-events: none;
        }

        @media (max-width: 550px) {
            .main-glitch { font-size: 1.6rem; }
            .tremux-badge span:last-child { font-size: 1rem; }
            .content { padding: 20px 16px; }
            .toast-hacker { white-space: normal; width: 80%; text-align: center; }
        }
    </style>
</head>
<body>

<!-- خلفية 010101 متحركة (هولوجرام) -->
<div class="matrix-bg" id="matrixBg"></div>
<div class="corner-binary">01001110 01001000 01011010 00110101</div>
<div id="toastMsg" class="toast-hacker">⚡ SYSTEM READY ⚡</div>

<div class="glass-hacker">
    <div class="hacker-header">
        <div class="title-tremux">
            <div class="main-glitch">مَرڪز التَّلْغِـيم</div>
            <div class="tremux-badge">
                <span>🌀</span>
                <span>WHISKY</span>
            </div>
        </div>
        <div class="sub-glitch">
            &lt; STEG_ANONYMUS /&gt;  [ 0x0F0F ]
        </div>
    </div>

    <div class="content">
        <!-- اختيار ملف -->
        <div class="file-box" id="fileBox">
            <label class="file-label" for="imageInput">
                <div class="file-icon">📀</div>
                <div class="file-text">اختيار ملف</div>
                <div class="file-name" id="fileNameDisplay">لم يتم اختيار أي ملف</div>
            </label>
            <input type="file" id="imageInput" accept="image/jpeg, image/png, image/jpg, image/webp">
        </div>

        <!-- حقل أيدي تليجرام -->
        <div class="telegram-input">
            <label>🔻 أدخل أيدي تليجرام 🔻</label>
            <input type="text" id="telegramUsername" placeholder="@anonymous_hacker  أو بدون @">
        </div>

        <!-- زر تلقيم الصورة -->
        <button class="action-btn" id="stegBtn">🧿 تـلـغيم الـصوره الأن 🧿</button>

        <!-- زر قناتي -->
        <button class="channel-btn" id="channelBtn">📡 قناتي | TELEGRAM</button>

        <!-- تذييل سيتغير -->
        <div class="footer">
            <p id="footerCredit">2026 جميع الحقوق التطوير محفوظة لدى 𝑾𝑯𝑰𝑺𝑲𝒀 𝑬𝑳𝒀𝑶𝑼𝑻𝑼𝑩𝑬𝑹</p>
        </div>
    </div>
</div>

<script>
    (function(){
        // === عناصر DOM ===
        const imageInput = document.getElementById('imageInput');
        const fileNameSpan = document.getElementById('fileNameDisplay');
        const telegramInput = document.getElementById('telegramUsername');
        const stegBtn = document.getElementById('stegBtn');
        const channelBtn = document.getElementById('channelBtn');
        const footerCredit = document.getElementById('footerCredit');
        const toastDiv = document.getElementById('toastMsg');

        // النص النهائي للهاكر
        const HACKER_FOOTER = "جميع الحقوق محفوظة لدى الهكر 𝑾𝑯𝑰𝑺𝑲𝒀 𝑬𝑳𝒀𝑶𝑼𝑻𝑼𝑩𝑬𝑹";
        const CHANNEL_LINK = "https://t.me/Whiskybots";

        let selectedImageFile = null;

        // === خلفية matrix 010101 ديناميكية ===
        function generateMatrixBg() {
            const container = document.getElementById('matrixBg');
            container.innerHTML = '';
            const cols = Math.floor(window.innerWidth / 28);
            const rows = 25;
            for (let i = 0; i < cols; i++) {
                let line = '';
                for (let j = 0; j < rows; j++) {
                    line += Math.random() > 0.5 ? '1' : '0';
                    line += ' ';
                }
                const span = document.createElement('div');
                span.className = 'matrix-line';
                span.style.left = (i * 30) + 'px';
                span.style.animationDuration = (12 + Math.random() * 15) + 's';
                span.style.animationDelay = (Math.random() * 8) + 's';
                span.innerText = line;
                span.style.position = 'absolute';
                span.style.color = '#1eff6e';
                span.style.fontSize = '14px';
                span.style.whiteSpace = 'nowrap';
                span.style.opacity = 0.3 + Math.random() * 0.4;
                container.appendChild(span);
            }
        }
        generateMatrixBg();
        window.addEventListener('resize', generateMatrixBg);

        function showToast(msg, duration = 2100) {
            toastDiv.innerText = msg;
            toastDiv.style.opacity = '1';
            toastDiv.style.transform = 'translateX(-50%) scale(1)';
            clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(() => {
                toastDiv.style.opacity = '0';
                toastDiv.style.transform = 'translateX(-50%) scale(0.9)';
            }, duration);
        }

        // اختيار الصورة
        imageInput.addEventListener('change', function(e) {
            if (imageInput.files && imageInput.files.length > 0) {
                const file = imageInput.files[0];
                if (!file.type.startsWith('image/')) {
                    showToast("❌ [ERROR] الملف ليس صورة صالحة", 1800);
                    imageInput.value = '';
                    fileNameSpan.innerText = "لم يتم اختيار أي ملف";
                    selectedImageFile = null;
                    return;
                }
                selectedImageFile = file;
                fileNameSpan.innerText = file.name;
                showToast("✓ تم رفع الصورة | READY TO STEG", 1500);
            } else {
                selectedImageFile = null;
                fileNameSpan.innerText = "لم يتم اختيار أي ملف";
            }
        });
        document.getElementById('fileBox').addEventListener('click', (e) => {
            if (e.target.tagName !== 'LABEL' && !e.target.closest('.file-label')) imageInput.click();
        });

        // === دالة التلغيم الفعلية (LSB Steganography) ===
        async function steganographImage(imageFile, secretMessage) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        let data = imageData.data;
                        
                        const encoder = new TextEncoder();
                        const msgBytes = encoder.encode(secretMessage);
                        const delimiter = new Uint8Array([0x00, 0x00, 0xFF]);
                        const fullBytes = new Uint8Array([...msgBytes, ...delimiter]);
                        
                        const totalBits = fullBytes.length * 8;
                        const pixels = canvas.width * canvas.height;
                        if (pixels * 1 < totalBits) {
                            reject(new Error(`الصورة صغيرة جدًا! تحتاج إلى ${Math.ceil(totalBits/8)} بايت تقريباً`));
                            return;
                        }
                        
                        let bitIdx = 0;
                        for (let i = 0; i < fullBytes.length && bitIdx < totalBits; i++) {
                            const byteVal = fullBytes[i];
                            for (let bitPos = 7; bitPos >= 0; bitPos--) {
                                if (bitIdx >= totalBits) break;
                                const bit = (byteVal >> bitPos) & 1;
                                const pixelIdx = bitIdx; // بكسل لكل بت (نستخدم القناة الحمراء)
                                if (pixelIdx * 4 >= data.length) break;
                                const redPos = pixelIdx * 4;
                                let r = data[redPos];
                                r = (r & 0xFE) | bit;
                                data[redPos] = r;
                                bitIdx++;
                            }
                        }
                        
                        ctx.putImageData(imageData, 0, 0);
                        canvas.toBlob(blob => {
                            if(blob) resolve(blob);
                            else reject(new Error("فشل إنشاء الصورة الملغومة"));
                        }, 'image/png');
                    };
                    img.onerror = () => reject(new Error("فشل فك تشفير الصورة"));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error("خطأ بقراءة الملف"));
                reader.readAsDataURL(imageFile);
            });
        }
        
        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        // زر التلغيم الرئيسي
        stegBtn.addEventListener('click', async () => {
            if (!selectedImageFile) {
                showToast("⚠️ [ACCESS DENIED] لا توجد صورة محددة", 2000);
                return;
            }
            let username = telegramInput.value.trim();
            if(username === "") {
                showToast("⎛⎝⚠️⎠⎞ أدخل أيدي التليجرام لبدء التشفير", 2300);
                return;
            }
            const finalID = username.startsWith('@') ? username : '@' + username;
            const secretMsg = `TG: ${finalID}`;
            
            // تغيير التذييل فوراً إلى نص الهكر
            footerCredit.innerText = HACKER_FOOTER;
            footerCredit.style.textShadow = "0 0 6px #0f0";
            
            showToast("🌀 جاري التلغيم ... [HIDING DATA]", 1800);
            try {
                const steggedBlob = await steganographImage(selectedImageFile, secretMsg);
                const original = selectedImageFile.name;
                const dot = original.lastIndexOf('.');
                const base = dot !== -1 ? original.substring(0,dot) : original;
                const newName = `${base}_st3g4n0.png`;
                downloadBlob(steggedBlob, newName);
                showToast("✔️ تم التلغيم بنجاح! الصورة جاهزة للتحميل.", 2800);
                // إضافة وميض احتفالي للفوتر
                setTimeout(() => { footerCredit.style.textShadow = "0 0 0px"; }, 1800);
            } catch(err) {
                console.error(err);
                showToast(`🔥 فشل التلغيم: ${err.message}`, 3000);
            }
        });
        
        // زر قناتي
        channelBtn.addEventListener('click', () => {
            window.open(CHANNEL_LINK, '_blank');
            showToast("⚡ توجيه إلى قناة WHISKY ELYOUTUBER ⚡", 1800);
        });
        
        // تأكيد التذييل الأصلي في البداية
        footerCredit.innerText = "2025 جميع الحقوق التطوير محفوظة لدى 𝑾𝑯𝑰𝑺𝑲𝒀 𝑬𝑳𝒀𝑶𝑼𝑻𝑼𝑩𝑬𝑹";
        
        // حركة نيون إضافية
        setInterval(() => {
            const glitchTitle = document.querySelector('.main-glitch');
            if(glitchTitle) {
                glitchTitle.style.animation = 'none';
                setTimeout(() => { if(glitchTitle) glitchTitle.style.animation = 'glitchText 1.5s infinite'; }, 10);
            }
        }, 4000);
    })();
</script>
</body>
</html>
