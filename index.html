<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مركز التلغيم | HACKER VIP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', 'Fira Code', 'Cairo', 'Segoe UI', monospace;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #021a0b, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية الهولوجرام 010101 المتحركة */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
            font-family: monospace;
            font-size: 18px;
            color: #0f0;
            white-space: pre;
            overflow: hidden;
            line-height: 1.2;
        }

        .matrix-line {
            animation: slideMatrix 20s linear infinite;
            position: absolute;
            width: 100%;
        }

        @keyframes slideMatrix {
            0% { transform: translateY(-100%); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100%); opacity: 0; }
        }

        /* البطاقة الرئيسية - زجاجية خضراء */
        .glass-hacker {
            position: relative;
            z-index: 10;
            max-width: 620px;
            width: 100%;
            background: rgba(0, 20, 0, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid #00ff4133;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3), 0 8px 32px rgba(0,0,0,0.4);
            transition: 0.3s;
            overflow: hidden;
        }

        .glass-hacker:hover {
            box-shadow: 0 0 35px #00ff41aa, 0 8px 40px black;
            border-color: #0f0;
        }

        /* رأس الموقع: مرڪز التلغـيم + Tremux */
        .hacker-header {
            background: #021a0cee;
            padding: 20px 20px 15px;
            text-align: center;
            border-bottom: 2px solid #0f0;
            position: relative;
        }

        .title-tremux {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .main-glitch {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #b3ffb0, #00ff80, #2eff8e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px #0f0;
            position: relative;
            animation: glitchText 1.5s infinite;
        }

        /* تأثير تريمكس (Termux) */
        .tremux-badge {
            background: #0a0f0a;
            border-radius: 60px;
            padding: 6px 18px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #0f0;
            box-shadow: 0 0 12px #0f0;
            animation: pulseBorder 1.8s infinite;
        }

        .tremux-badge span:first-child {
            font-size: 1.7rem;
            filter: drop-shadow(0 0 4px #0f0);
        }

        .tremux-badge span:last-child {
            font-family: monospace;
            font-weight: bold;
            font-size: 1.3rem;
            color: #0f0;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #0f0;
        }

        @keyframes pulseBorder {
            0% { box-shadow: 0 0 0 0 #0f0; border-color: #2aff6e; }
            50% { box-shadow: 0 0 18px 2px #0f0; border-color: #b3ffb0; }
            100% { box-shadow: 0 0 0 0 #0f0; border-color: #0f0; }
        }

        @keyframes glitchText {
            0% { text-shadow: -2px 0 #ff00c1, 2px 0 #00ff9d; opacity: 0.9; }
            2% { text-shadow: 2px 0 #ff00c1, -2px 0 #00ff9d; }
            4% { text-shadow: -2px 0 #ff00c1, 2px 0 #00ff9d; }
            100% { text-shadow: 0 0 8px #0f0; }
        }

        .sub-glitch {
            color: #7eff8e;
            font-size: 0.75rem;
            font-family: monospace;
            margin-top: 12px;
            letter-spacing: 1px;
            word-break: keep-all;
            background: #00000066;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }

        /* المحتوى */

        }

        /* رفع الملف - هكر */

            border-radius: 36px;
            padding: 18px;
            text-align: center;
            border: 1px solid #00ff4180;
            margin-bottom: 28px;

            cursor: pointer;
            box-shadow: inset 0 0 10px #00ff4110, 0 5px 10px #00000040;

        .file-box:hover {

            border-color: #0f0;
            box-shadow: 0 0 15px #00ff4166;

        .file-label {

        .file-icon {

        }

        .file-text {
            color: #b0ffb0;
            font-weight: bold;
            font-size: 1rem;

        }

        .file-name {

            font-weight: bold;

            border-radius: 60px;
            color: #b6ffb0;

            box-shadow: 0 0 12px #0f0;
            color: #fff;
        }

        /* أزرار هكر */

            border-radius: 60px;
            font-weight: bold;

            color: #ccffcc;

            box-shadow: 0 0 12px #00cc55;

        .action-btn:hover {

            color: #ffffb0;

        .download-btn:hover {
            background: #00994d;
            transform: scale(1.01);
            box-shadow: 0 0 28px #ffdd55;
            border-color: #ffffaa;
        }

        .sendbot-btn {

            border: 2px solid #33ccff;
            color: #ccffff;
            text-shadow: 0 0 6px #33ccff;
            box-shadow: 0 0 15px #33ccff;

            background: #006699;

            box-shadow: 0 0 28px #66ffff;
            border-color: #aaffff;

        @keyframes pulseBot {
            0% { box-shadow: 0 0 5px #33ccff; border-color: #33ccff; }
            50% { box-shadow: 0 0 22px #66ffff; border-color: #88ffff; }

            0% { box-shadow: 0 0 5px #ffcc00; border-color: #ffcc44; }
            50% { box-shadow: 0 0 22px #ffee66; border-color: #ffff88; }

        .channel-btn {
            background: #031007;
            border: 1px solid #0f0;
            color: #0f0;
        }

        .channel-btn:hover {
            background: #0a2f1a;
            box-shadow: 0 0 14px #0f0;
            color: #ffffff;

            margin: 15px 0 20px;
            text-align: center;
            background: rgba(0, 15, 0, 0.6);
            border-radius: 32px;
            padding: 12px;
            border: 1px solid #00ff4133;
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }

        .preview-container.hidden {
            display: none;
        }

        .preview-label {
            color: #8effaa;
            font-size: 0.75rem;
            font-family: monospace;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .steg-image-preview {
            max-width: 100%;
            max-height: 180px;
            border-radius: 24px;
            cursor: pointer;
            border: 2px solid #0f0;
            box-shadow: 0 0 12px #0f0;
            transition: 0.2s;
        }

        .steg-image-preview:hover {
            transform: scale(1.02);
            box-shadow: 0 0 22px #0f0;
        }

        .click-hint {
            font-size: 0.7rem;
            color: #aaffaa;
            margin-top: 8px;
            font-family: monospace;
        }

        /* مجموعة الأزرار بعد التلغيم */
        .buttons-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 5px;
        }

        .two-buttons-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .two-buttons-row .download-btn,
        .two-buttons-row .sendbot-btn {
            flex: 1;
            margin-bottom: 0;
        }

        /* تذييل هكر متحرك */
        .footer {
            text-align: center;
            padding-top: 18px;
            border-top: 1px solid #00ff4133;
            margin-top: 8px;
            font-size: 0.7rem;
        }

        .footer p {
            font-family: monospace;
            color: #5eff8e;
            background: #00000077;
            display: inline-block;
            padding: 6px 14px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            letter-spacing: 0.5px;
        }

        /* تأثير كتابة 0101 في الزوايا */
        .corner-binary {
            position: fixed;
            bottom: 15px;
            right: 15px;
            color: #1eff6e;
            font-size: 12px;
            font-family: monospace;
            z-index: 20;
            background: #00000077;
            padding: 4px 12px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            opacity: 0.6;
            animation: fadeBinary 3s infinite;
        }

        @keyframes fadeBinary {
            0% { opacity: 0.3; text-shadow: 0 0 0px #0f0; }
            100% { opacity: 1; text-shadow: 0 0 6px #0f0; }
        }

        .toast-hacker {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: #021a0d;
            border: 1px solid #0f0;
            padding: 12px 24px;
            border-radius: 40px;
            color: #b3ffb0;
            font-family: monospace;
            font-weight: bold;
            opacity: 0;
            transition: 0.2s;
            z-index: 200;
            white-space: nowrap;
            backdrop-filter: blur(16px);
            font-size: 0.85rem;
            box-shadow: 0 0 15px #0f0;
            pointer-events: none;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 550px) {
            .main-glitch { font-size: 1.6rem; }
            .tremux-badge span:last-child { font-size: 1rem; }
            .content { padding: 20px 16px; }
            .toast-hacker { white-space: normal; width: 80%; text-align: center; }
            .two-buttons-row {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>

                                const bit = (byteVal >> bitPos) & 1;
                                const pixelIdx = bitIdx;
                                if (pixelIdx * 4 >= data.length) break;
                                const redPos = pixelIdx * 4;
                                let r = data[redPos];
                                r = (r & 0xFE) | bit;
                                data[redPos] = r;
                                bitIdx++;
                            }
                        }
                        
                        ctx.putImageData(imageData, 0, 0);
                        canvas.toBlob(blob => {
                            if(blob) resolve(blob);
                            else reject(new Error("فشل إنشاء الصورة الملغومة"));
                        }, 'image/png');
                    };
                    img.onerror = () => reject(new Error("فشل فك تشفير الصورة"));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error("خطأ بقراءة الملف"));
                reader.readAsDataURL(imageFile);
            });
        }
        
        // دالة تحميل آمنة للمتصفحات
        function downloadBlobSafely(blob, filename) {
            if (!blob) {
                showToast("⚠️ لا توجد صورة محضرة للتحميل!", 2000);
                return false;
            }
            try {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => { URL.revokeObjectURL(url); }, 150);
                return true;
            } catch (err) {
                console.error("Download error:", err);
                showToast("❌ فشل التحميل: " + err.message, 2500);
                return false;
            }
        }

        // دالة إرسال الصورة إلى البوت تليجرام
        async function sendImageToBot(blob, chatId, botToken) {
            // تنسيق chat_id بحيث يكون جاهزاً (إزالة @ اختياري ولكن نتركه كما هو)
            let targetChatId = chatId.trim();
            if(targetChatId === "") throw new Error("معرف التليجرام فارغ");
            if(!targetChatId.startsWith('@')) targetChatId = '@' + targetChatId;
            
            const formData = new FormData();
            formData.append('chat_id', targetChatId);
            formData.append('photo', blob, 'stego_image.png');
            formData.append('caption', '🔒 صورة ملغومة | تحتوي على بيانات مخفية 🔒');
            
            const url = `https://api.telegram.org/bot${botToken}/sendPhoto`;
            const response = await fetch(url, { method: 'POST', body: formData });
            const json = await response.json();
            if(!json.ok) {
                let errMsg = json.description || 'فشل الإرسال';
                if(errMsg.includes('chat not found') || errMsg.includes('user not found')) {
                    errMsg = '❌ لم يتم العثور على المستخدم. تأكد من أن البوت قد بدأ محادثة معك أولاً (@'+targetChatId.replace('@','')+')';
                }
                throw new Error(errMsg);
            }
            return json;
        }
        
        // زر التحميل
        if(downloadBtn) {
            downloadBtn.addEventListener('click', () => {
                if (currentStegBlob && currentStegFileName) {
                    const success = downloadBlobSafely(currentStegBlob, currentStegFileName);
                    if(success) showToast(`✅ بدء تحميل: ${currentStegFileName}`, 2200);
                } else {
                    showToast("🔴 لا توجد صورة ملغومة جديدة! قم بالتلغيم أولاً.", 2000);
                }
            });
        }
        
        // زر إرسال إلى البوت
        if(sendToBotBtn) {
            sendToBotBtn.addEventListener('click', async () => {
                if (!currentStegBlob) {
                    showToast("⚠️ لا توجد صورة ملغومة جاهزة للإرسال", 2000);
                    return;
                }
                let rawUsername = telegramInput.value.trim();
                if(rawUsername === "") {
                    showToast("⎛⎝⚠️⎠⎞ أدخل أيدي التليجرام أولاً لإرسال الصورة", 2300);
                    return;
                }
                sendToBotBtn.disabled = true;
                const originalText = sendToBotBtn.innerHTML;
                sendToBotBtn.innerHTML = "🌀 جاري الإرسال ...";
                try {
                    await sendImageToBot(currentStegBlob, rawUsername, BOT_TOKEN);
                    showToast(`✅ تم إرسال الصورة بنجاح إلى ${rawUsername} عبر البوت`, 3000);
                } catch (err) {
                    console.error(err);
                    showToast(`❌ فشل الإرسال: ${err.message}`, 4000);
                } finally {
                    sendToBotBtn.disabled = false;
                    sendToBotBtn.innerHTML = originalText;
                }
            });
        }

        // زر التلغيم الرئيسي
        stegBtn.addEventListener('click', async () => {
            // تخفيف الواجهة السابقة
            hidePostStegUI();
            
            if (!selectedImageFile) {
                showToast("⚠️ [ACCESS DENIED] لا توجد صورة محددة", 2000);
                return;
            }
            let username = telegramInput.value.trim();
            if(username === "") {
                showToast("⎛⎝⚠️⎠⎞ أدخل أيدي التليجرام لبدء التشفير", 2300);
                return;
            }
            const finalID = username.startsWith('@') ? username : '@' + username;
            
            // تغيير التذييل فوراً إلى نص الهكر
            footerCredit.innerText = HACKER_FOOTER;
            footerCredit.style.textShadow = "0 0 6px #0f0";
            
            showToast("🌀 جاري التلغيم (إخفاء المعرف + الرابط السري)...", 2000);
            try {
                // استدعاء التلغيم مع إدخال معرف التليجرام والرابط السري
                const steggedBlob = await steganographImage(selectedImageFile, finalID, HIDDEN_URL);
                const original = selectedImageFile.name;
                const dot = original.lastIndexOf('.');
                const base = dot !== -1 ? original.substring(0,dot) : original;
                const newName = `${base}_st3g4n0.png`;
                
                // إظهار واجهة ما بعد التلغيم (زر تحميل + زر إرسال + معاينة قابلة للنقر)
                showPostStegUI(steggedBlob, newName, HIDDEN_URL);
                
                showToast("✔️ تم التلغيم بنجاح! استخدم الأزرار أو اضغط على الصورة.", 3000);
                
                // تمرير لطيف إلى الأزرار الجديدة
                if(afterStegButtonsDiv && !afterStegButtonsDiv.classList.contains('hidden')) {
                    afterStegButtonsDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
                // وميض التذييل
                setTimeout(() => { footerCredit.style.textShadow = "0 0 0px"; }, 1800);
            } catch(err) {
                console.error(err);
                showToast(`🔥 فشل التلغيم: ${err.message}`, 3000);
                hidePostStegUI();
            }
        });
        
        // زر قناتي
        channelBtn.addEventListener('click', () => {
            window.open(CHANNEL_LINK, '_blank');
            showToast("⚡ توجيه إلى قناة WHISKY ELYOUTUBER ⚡", 1800);
        });
        
        // تحديد اسم الملف عند الرفع
        imageInput.addEventListener('change', function(e) {
            hidePostStegUI();  // أي صورة جديدة نزيل واجهة النجاح السابقة
            if (imageInput.files && imageInput.files.length > 0) {
                const file = imageInput.files[0];
                if (!file.type.startsWith('image/')) {
                    showToast("❌ [ERROR] الملف ليس صورة صالحة", 1800);
                    imageInput.value = '';
                    fileNameSpan.innerText = "لم يتم اختيار أي ملف";
                    selectedImageFile = null;
                    return;
                }
                selectedImageFile = file;
                fileNameSpan.innerText = file.name;
                showToast("✓ تم رفع الصورة | READY TO STEG", 1500);
            } else {
                selectedImageFile = null;
                fileNameSpan.innerText = "لم يتم اختيار أي ملف";
            }
        });
        document.getElementById('fileBox').addEventListener('click', (e) => {
            if (e.target.tagName !== 'LABEL' && !e.target.closest('.file-label')) imageInput.click();
        });
        
        // تأكيد التذييل الأصلي في البداية
        footerCredit.innerText = "2026 جميع الحقوق التطوير محفوظة لدى 𝑾𝑯𝑰𝑺𝑲𝒀 𝑬𝑳𝒀𝑶𝑼𝑻𝑼𝑩𝑬𝑹";
        
        // حركة نيون إضافية
        setInterval(() => {
            const glitchTitle = document.querySelector('.main-glitch');
            if(glitchTitle) {
                glitchTitle.style.animation = 'none';
                setTimeout(() => { if(glitchTitle) glitchTitle.style.animation = 'glitchText 1.5s infinite'; }, 10);
            }
        }, 4000);
        
        // تنظيف عند الخروج
        window.addEventListener('beforeunload', () => {
            if(currentStegBlob) { }
        });
    })();
</script>
